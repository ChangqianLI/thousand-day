<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thousand-Day Journey</title>
    <style>
        /* ================= 基础重置 ================= */
        body, html { margin: 0; padding: 0; height: 100%; background-color: #e0d7c6; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }

        /* ================= 视口与世界设计 ================= */
        #viewport {
            position: relative; width: 900px; height: 600px;
            border: 12px solid #5d4037; border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6); overflow: hidden;
            background-color: #b3e5fc;
        }

        #world {
            position: absolute; width: 2000px; height: 2000px;
            background-image: 
                linear-gradient(90deg, #d7ccc8 80px, transparent 80px),
                linear-gradient(0deg, #d7ccc8 80px, transparent 80px);
            background-size: 400px 400px;
            transform-origin: 0 0; will-change: transform;
            background-color: #c8e6c9;
        }

        /* ================= 环境装饰物 ================= */
        .decor {
            position: absolute; user-select: none;
            transform: translate(-50%, -100%);
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.2));
            pointer-events: none;
        }
        .cozy-tree-oak { width: 80px; height: 120px; }
        .cozy-tree-oak .trunk { position: absolute; bottom: 0; left: 50%; width: 16px; height: 40px; background: linear-gradient(to right, #795548, #5d4037); border-radius: 8px 8px 4px 4px; transform: translateX(-50%); border: 2px solid rgba(0,0,0,0.2); }
        .cozy-tree-oak .foliage { position: absolute; bottom: 35px; left: 0; width: 80px; height: 90px; background: radial-gradient(circle at 30% 30%, #aed581 0%, #aed581 50%, transparent 52%), radial-gradient(circle at 70% 40%, #9ccc65 0%, #9ccc65 60%, transparent 62%), radial-gradient(circle at 50% 70%, #8bc34a 0%, #8bc34a 70%, transparent 72%), #9ccc65; border-radius: 45% 55% 50% 50% / 60% 40% 60% 40%; border: 3px solid rgba(0,0,0,0.2); box-shadow: inset 0 0 20px rgba(255,255,255,0.3); }
        .cozy-bush { width: 50px; height: 40px; }
        .cozy-bush .foliage { position: absolute; bottom: 0; left: 0; width: 50px; height: 40px; background: radial-gradient(circle at 50% 50%, #dce775 0%, #c0ca33 70%, transparent 72%), #afb42b; border-radius: 50% 50% 20% 20%; border: 3px solid rgba(0,0,0,0.2); }
        .cozy-bush .flowers::after { content: '✿ ✿'; position: absolute; top: 10px; left: 8px; width: 35px; font-size: 14px; color: #ffeb3b; letter-spacing: 4px; filter: drop-shadow(0 0 2px white); }
        .cozy-bench { width: 60px; height: 35px; }
        .cozy-bench .back { position: absolute; bottom: 15px; left: 0; width: 60px; height: 20px; background: repeating-linear-gradient(to right, #a1887f, #a1887f 10px, #8d6e63 10px, #8d6e63 12px); border-radius: 5px; border: 2px solid rgba(0,0,0,0.2); }
        .cozy-bench .seat { position: absolute; bottom: 5px; left: 0; width: 60px; height: 12px; background: #a1887f; border-radius: 3px; border: 2px solid rgba(0,0,0,0.2); transform: skewX(-15deg); }

        /* ================= 动漫房子模型设计 ================= */
        .shop {
            position: absolute; width: 160px; height: 160px; 
            border: 4px solid #5d4037; border-radius: 12px;
            background-color: #f5f1e6; 
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4); transform: translate(-50%, -100%); 
        }

        /* 浮动灯牌 */
        .shop-name {
            position: absolute;
            top: -45px; 
            left: 50%; 
            transform: translateX(-50%); 
            height: auto;
            width: max-content; /* 适应内容宽度 */
            min-width: 60px; /* 为了短名字（如 Z❄️）调小了最小宽度 */
            padding: 8px 16px; 
            background-color: rgba(255, 255, 255, 0.95); 
            color: #5d4037; font-weight: 800; font-size: 16px; 
            border: 3px solid #5d4037; 
            border-radius: 12px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2); 
            z-index: 10; 
            will-change: transform; 
            text-shadow: none; 
            display: flex; align-items: center; justify-content: center;
        }

        .shop::before { content: ''; position: absolute; top: 0; left: 50%; width: 140px; height: 80px; background-color: #e74c3c; background-image: repeating-linear-gradient(-45deg, rgba(255,255,255,0.1), rgba(255,255,255,0.1) 10px, rgba(0,0,0,0.1) 10px, rgba(0,0,0,0.1) 20px); border: 3px solid #5d4037; border-radius: 20px 20px 0 0; transform: translateX(-50%); z-index: 1; }
        .shop::after { content: ''; position: absolute; top: -15px; right: 20px; width: 25px; height: 35px; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 35"><rect x="0" y="0" width="25" height="25" fill="%23f5f1e6" rx="3"/><rect x="0" y="25" width="25" height="10" fill="%23c0392b" rx="2"/></svg>'); background-size: cover; border: 2px solid #5d4037; z-index: 1; }
        .shop-details { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 5px; z-index: 0; }
        .shop-door { width: 40px; height: 50px; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 50"><rect x="0" y="0" width="40" height="50" fill="%238d6e63" rx="4"/><circle cx="33" cy="25" r="3" fill="%235d4037"/><line x1="0" y1="0" x2="40" y2="0" stroke="%235d4037" stroke-width="2"/><line x1="0" y1="50" x2="40" y2="50" stroke="%235d4037" stroke-width="2"/></svg>'); background-size: cover; border: 2px solid #5d4037; border-radius: 4px; }
        .shop-window { width: 35px; height: 35px; margin: 0 5px; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 35 35"><rect x="0" y="0" width="35" height="35" fill="%2381d4fa" rx="3"/><line x1="17.5" y1="0" x2="17.5" y2="35" stroke="%235d4037" stroke-width="2"/><line x1="0" y1="17.5" x2="35" y2="17.5" stroke="%235d4037" stroke-width="2"/></svg>'); background-size: cover; border: 2px solid #5d4037; border-radius: 3px; }
        .shop-flowerpot { width: 30px; height: 15px; margin: 0 3px; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 15"><rect x="0" y="0" width="30" height="15" fill="%238d6e63" rx="3"/><text x="2" y="10" font-size="10" fill="%23ffeb3b">&#127803;</text><text x="12" y="10" font-size="10" fill="%23ff4444">&#127802;</text><text x="22" y="10" font-size="10" fill="%23ffeb3b">&#127803;</text></svg>'); background-size: cover; border: 1px solid #5d4037; border-radius: 2px; }

        /* ================= 角色设计 (bear.gif) ================= */
        #player { position: absolute; width: 60px; height: 60px; background-image: url('bear.gif'); background-size: contain; background-repeat: no-repeat; background-position: center; transform: translate(-50%, -50%); will-change: transform, left, top; }
        #player::after { content: ''; position: absolute; bottom: -5px; left: 50%; width: 40px; height: 15px; background: rgba(0,0,0,0.3); border-radius: 50%; transform: translateX(-50%); z-index: -1; }

        /* ================= 弹窗设计 ================= */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; }
        #modal-content { background-color: #f5f1e6; padding: 30px; border-radius: 15px; text-align: center; max-width: 650px; width: 85%; box-shadow: 0 0 40px #000; border: 6px solid #5d4037; }
        #modal-title { color: #5d4037; margin-top: 0; }
        #modal-media { max-width: 100%; max-height: 400px; border-radius: 10px; margin-top: 15px; border: 4px solid #8d6e63; }
        .close-btn { margin-top: 25px; padding: 12px 30px; background-color: #8d6e63; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 17px; font-weight: bold; transition: 0.2s; }
        .close-btn:hover { background-color: #5d4037; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="world">
            <div id="shop1" class="shop" style="left: 300px; top: 600px;" data-title="Z❄️" data-src="movie1.mp4">
                <div class="shop-name">Z❄️</div> 
                <div class="shop-details"><div class="shop-flowerpot"></div><div class="shop-window"></div><div class="shop-door"></div><div class="shop-window"></div><div class="shop-flowerpot"></div></div>
            </div>
            <div id="shop2" class="shop" style="left: 700px; top: 600px;" data-title="🌟H✨" data-src="movie2.mp4">
                <div class="shop-name">🌟H✨</div>
                <div class="shop-details"><div class="shop-flowerpot"></div><div class="shop-window"></div><div class="shop-door"></div><div class="shop-window"></div><div class="shop-flowerpot"></div></div>
            </div>
            <div id="shop3" class="shop" style="left: 1100px; top: 600px;" data-title="A❤️✍️" data-src="movie3.mp4">
                <div class="shop-name">A❤️✍️</div>
                <div class="shop-details"><div class="shop-flowerpot"></div><div class="shop-window"></div><div class="shop-door"></div><div class="shop-window"></div><div class="shop-flowerpot"></div></div>
            </div>
            <div id="shop4" class="shop" style="left: 1500px; top: 600px;" data-title="💓🚥O" data-src="movie4.mp4">
                <div class="shop-name">💓🚥O</div>
                <div class="shop-details"><div class="shop-flowerpot"></div><div class="shop-window"></div><div class="shop-door"></div><div class="shop-window"></div><div class="shop-flowerpot"></div></div>
            </div>

            <div id="shop5" class="shop" style="left: 600px; top: 1200px;" data-title="J☀️" data-src="movie5.mp4">
                <div class="shop-name">J☀️</div>
                <div class="shop-details"><div class="shop-flowerpot"></div><div class="shop-window"></div><div class="shop-door"></div><div class="shop-window"></div><div class="shop-flowerpot"></div></div>
            </div>
            <div id="shop6" class="shop" style="left: 1200px; top: 1200px;" data-title="想J你" data-src="movie6.mp4">
                <div class="shop-name">想J你</div>
                <div class="shop-details"><div class="shop-flowerpot"></div><div class="shop-window"></div><div class="shop-door"></div><div class="shop-window"></div><div class="shop-flowerpot"></div></div>
            </div>

            <div id="player" style="left: 300px; top: 750px;"></div>
        </div>
    </div>

    <div id="modal">
        <div id="modal-content">
            <h2 id="modal-title">店铺名称</h2>
            <div id="media-container"></div>
            <button class="close-btn" onclick="closeModal()">离开 (Esc)</button>
        </div>
    </div>

    <script>
        const player = document.getElementById('player');
        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const shops = document.querySelectorAll('.shop');

        const worldWidth = 2000, worldHeight = 2000;
        const viewportWidth = 900, viewportHeight = 600;

        let playerX = 300, playerY = 750; 
        const speed = 5;
        let isModalOpen = false;

        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            if (e.key === 'Escape' && isModalOpen) closeModal();
        });
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        function generateEnvironment() {
            const decorTypes = ['oak', 'bush', 'bench'];
            const amount = 400; 
            for (let i = 0; i < amount; i++) {
                let x = Math.floor(Math.random() * worldWidth);
                let y = Math.floor(Math.random() * worldHeight);
                if (x % 400 < 100 || y % 400 < 100) continue;
                if (Math.abs(x - 300) < 120 && Math.abs(y - 750) < 120) continue;
                let isInShop = false;
                shops.forEach(shop => {
                    let sl = shop.offsetLeft - 80, sr = shop.offsetLeft + shop.offsetWidth + 80;
                    let st = shop.offsetTop - 80, sb = shop.offsetTop + shop.offsetHeight + 80;
                    if (x > sl && x < sr && y > st && y < sb) isInShop = true;
                });
                if (isInShop) continue;
                let el = document.createElement('div');
                el.className = 'decor';
                el.style.left = x + 'px'; el.style.top = y + 'px';
                const type = decorTypes[Math.floor(Math.random() * decorTypes.length)];
                if (type === 'oak') { el.classList.add('cozy-tree-oak'); el.innerHTML = '<div class="foliage"></div><div class="trunk"></div>'; }
                else if (type === 'bush') { el.classList.add('cozy-bush'); el.innerHTML = '<div class="foliage"></div><div class="flowers"></div>'; }
                else if (type === 'bench') { el.classList.add('cozy-bench'); el.innerHTML = '<div class="back"></div><div class="seat"></div>'; }
                el.style.zIndex = y; 
                world.appendChild(el);
            }
            shops.forEach(shop => { shop.style.zIndex = shop.offsetTop + shop.offsetHeight; });
        }
        
        generateEnvironment();

        function gameLoop() {
            if (!isModalOpen) { movePlayer(); updateCamera(); checkCollisions(); }
            requestAnimationFrame(gameLoop);
        }

        function movePlayer() {
            if (keys.w || keys.ArrowUp) { playerY -= speed; }
            if (keys.s || keys.ArrowDown) { playerY += speed; }
            if (keys.a || keys.ArrowLeft) { playerX -= speed; player.style.transform = 'translate(-50%, -50%) scaleX(1)'; }
            if (keys.d || keys.ArrowRight) { playerX += speed; player.style.transform = 'translate(-50%, -50%) scaleX(-1)'; }
            playerX = Math.max(30, Math.min(worldWidth - 30, playerX));
            playerY = Math.max(30, Math.min(worldHeight - 30, playerY));
            player.style.left = playerX + 'px'; player.style.top = playerY + 'px';
            player.style.zIndex = Math.floor(playerY + 30);
        }

        function updateCamera() {
            let cameraX = playerX - viewportWidth / 2;
            let cameraY = playerY - viewportHeight / 2;
            cameraX = Math.max(0, Math.min(worldWidth - viewportWidth, cameraX));
            cameraY = Math.max(0, Math.min(worldHeight - viewportHeight, cameraY));
            world.style.transform = `translate(${-cameraX}px, ${-cameraY}px)`;
        }

        function checkCollisions() {
            const pBox = { left: playerX - 25, right: playerX + 25, top: playerY - 10, bottom: playerY + 30 };
            shops.forEach(shop => {
                const sBox = { left: shop.offsetLeft - 60, right: shop.offsetLeft + 60, top: shop.offsetTop - 60, bottom: shop.offsetTop };
                if (pBox.left < sBox.right && pBox.right > sBox.left && pBox.top < sBox.bottom && pBox.bottom > sBox.top) {
                    openModal(shop);
                }
            });
        }

        function openModal(shopElement) {
            isModalOpen = true;
            playerY += 60; 
            player.style.top = playerY + 'px';
            updateCamera(); 
            for(let key in keys) keys[key] = false; 
            document.getElementById('modal-title').innerText = '欢迎来到 ' + shopElement.getAttribute('data-title');
            const container = document.getElementById('media-container');
            container.innerHTML = ''; 
            const src = shopElement.getAttribute('data-src');
            container.innerHTML = `<video id="modal-media" controls autoplay name="media"><source src="${src}" type="video/mp4"></video>`;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('media-container').innerHTML = ''; 
            isModalOpen = false; 
        }

        updateCamera();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
